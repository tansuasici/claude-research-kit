name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      # On a conventional-commit push to main, opens/updates a release PR with the
      # auto-generated CHANGELOG (Features / Bug Fixes / …) and version bumps across
      # VERSION, package.json, and the plugin manifests. Merging it tags the release.
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
